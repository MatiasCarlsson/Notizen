# Render deployment config for Notizen
# Docs: https://render.com/docs/infrastructures-as-code
# Deploy: connect this repo in Render and select "render.yaml" (Blueprint).

services:
  # ─── Backend (NestJS + Postgres externo, ej. Supabase) ────────────
  - type: web
    name: notizen-backend
    runtime: node
    region: oregon # cambia a la región más cercana
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # Postgres externo (Supabase). Completá las URIs en el dashboard de Render.
      # DATABASE_URL: pooler transaction-mode (6543, ?pgbouncer=true) para queries en runtime.
      # DIRECT_URL: conexión directa (5432) para `prisma db push`/migraciones.
      # A ambas agregales &sslmode=require (Supabase exige SSL).
      - key: DATABASE_URL
        sync: false # pegá aquí la connection string transaction-pooler de Supabase
      - key: DIRECT_URL
        sync: false # pegá aquí la connection string directa (session) de Supabase
      # URL del frontend para CORS (ajustá al dominio real de Render)
      - key: FRONTEND_URL
        sync: false # completá con la URL de notizen-frontend

  # ─── Frontend (React + Vite, SPA estática) ──────────────────────────
  - type: web
    name: notizen-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: ./dist
    # SPA fallback: cualquier ruta no-existente sirve index.html
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false # completá con https://notizen-backend.onrender.com/api
