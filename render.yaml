# Render deployment config for Notizen
# Docs: https://render.com/docs/infrastructures-as-code
# Deploy: connect this repo in Render and select "render.yaml" (Blueprint).

databases:
  # ─── Postgres gestionado (persistente, free tier) ──────────────────
  - name: notizen-db
    databaseName: notizen
    user: notizen
    plan: free
    region: oregon # debe coincidir con el backend

services:
  # ─── Backend (NestJS + Postgres) ───────────────────────────────────
  - type: web
    name: notizen-backend
    runtime: node
    region: oregon # cambia a la región más cercana
    plan: free
    rootDir: backend
    buildCommand: export DATABASE_URL="postgresql://notizen:notizen@localhost:5432/notizen" && npm install --include=dev && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # Postgres gestionado por Render (se inyecta automáticamente)
      - key: DATABASE_URL
        fromDatabase:
          name: notizen-db
          property: connectionString
      # URL del frontend para CORS (ajustá al dominio real de Render)
      - key: FRONTEND_URL
        sync: false # completá con la URL de notizen-frontend

  # ─── Frontend (React + Vite, SPA estática) ──────────────────────────
  - type: web
    name: notizen-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install --include=dev && npm run build
    staticPublishPath: ./dist
    # SPA fallback: cualquier ruta no-existente sirve index.html
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false # completá con https://notizen-backend.onrender.com/api
