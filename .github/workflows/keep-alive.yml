name: Keep Supabase awake

# Evita que el proyecto free de Supabase se pause por inactividad (7 días sin consultas).
# No hace falta una consulta "pesada": cualquier query cuenta como actividad.
on:
  schedule:
    # Todos los lunes a las 04:17 UTC (hora poco común para no colisionar con otros crons).
    - cron: "17 4 * * 1"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Install postgresql-client
        run: sudo apt-get update -qq && sudo apt-get install -y postgresql-client

      - name: Query Supabase (keep alive)
        env:
          SUPABASE_DIRECT_URL: ${{ secrets.SUPABASE_DIRECT_URL }}
        run: psql "$SUPABASE_DIRECT_URL" -c "SELECT 1 AS keep_alive;"
